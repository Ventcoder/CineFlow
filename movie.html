<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie – CineFlow</title>




  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

/* =============================
   CineFlow – Global Styles
   ============================= */

:root {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --white: #ffffff;
  --gray: #888888;
  --gray2: #555555;
  --accent: #ffffff;
  --danger: #ff4444;
  --success: #44cc88;
  --seat-free: #2a2a2a;
  --seat-sel: #ffffff;
  --seat-taken: #444444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
button { cursor: pointer; font-family: inherit; }
input, textarea { font-family: inherit; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== NAVBAR ===== */
.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 64px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
}

.navbar .logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 26px;
  letter-spacing: 3px;
  color: var(--white);
}

.navbar .logo span { color: var(--gray); }

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}

.nav-links a {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  color: var(--gray);
  transition: color 0.2s;
  text-transform: uppercase;
}

.nav-links a:hover, .nav-links a.active { color: var(--white); }

.nav-links .btn-nav {
  background: var(--white);
  color: var(--bg);
  padding: 8px 20px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.2s, color 0.2s;
}

.nav-links .btn-nav:hover { background: var(--gray); color: var(--bg); }

.hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
.hamburger span { width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-block;
  padding: 12px 28px;
  border-radius: 4px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: none;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--white);
  color: var(--bg);
}
.btn-primary:hover { background: #ddd; transform: translateY(-1px); }

.btn-outline {
  background: transparent;
  color: var(--white);
  border: 1px solid var(--border);
}
.btn-outline:hover { border-color: var(--white); background: rgba(255,255,255,0.05); }

.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: #cc3333; }

.btn-sm { padding: 8px 16px; font-size: 11px; }

/* ===== HERO ===== */
.hero {
  min-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  text-align: center;
  padding: 60px 20px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.04) 0%, transparent 70%),
    var(--bg);
}

.hero::before {
  content: 'CINEFLOW';
  position: absolute;
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(80px, 20vw, 280px);
  color: rgba(255,255,255,0.02);
  letter-spacing: 10px;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}

.hero-content { position: relative; z-index: 1; }

.hero-tag {
  display: inline-block;
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gray);
  border: 1px solid var(--border);
  padding: 6px 16px;
  border-radius: 50px;
  margin-bottom: 28px;
}

.hero h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(52px, 10vw, 120px);
  line-height: 0.95;
  letter-spacing: 4px;
  margin-bottom: 20px;
}

.hero h1 span { color: var(--gray2); }

.hero p {
  font-size: 16px;
  color: var(--gray);
  max-width: 460px;
  margin: 0 auto 40px;
  line-height: 1.7;
}

/* ===== SEARCH BAR ===== */
.search-bar {
  display: flex;
  max-width: 520px;
  width: 100%;
  margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  transition: border-color 0.2s;
}

.search-bar:focus-within { border-color: var(--white); }

.search-bar input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  padding: 14px 20px;
  color: var(--white);
  font-size: 14px;
}

.search-bar input::placeholder { color: var(--gray2); }

.search-bar button {
  background: var(--white);
  color: var(--bg);
  border: none;
  padding: 14px 24px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.2s;
}

.search-bar button:hover { background: #ddd; }

/* ===== SECTIONS ===== */
section { padding: 80px 40px; }

.section-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 40px;
}

.section-label {
  font-size: 11px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 8px;
}

.section-title {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(32px, 5vw, 52px);
  letter-spacing: 2px;
  line-height: 1;
}

.divider {
  width: 100%;
  height: 1px;
  background: var(--border);
  margin: 0 0 60px;
}

/* ===== MOVIE CARDS ===== */
.movies-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

.movie-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}

.movie-card:hover { transform: translateY(-4px); border-color: var(--gray2); }

.movie-card .poster {
  aspect-ratio: 2/3;
  overflow: hidden;
  position: relative;
  background: var(--surface2);
}

.movie-card .poster img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
}

.movie-card:hover .poster img { transform: scale(1.04); }

.movie-card .poster .rating {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.8);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
}

.movie-card .card-body { padding: 16px; }

.movie-card .genre-tag {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 6px;
}

.movie-card .title {
  font-family: 'Bebas Neue', cursive;
  font-size: 20px;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

.movie-card .card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.movie-card .price { font-size: 13px; color: var(--gray); }
.movie-card .price strong { color: var(--white); font-size: 16px; }

/* ===== POSTER PLACEHOLDER ===== */
.poster-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  flex-direction: column;
  gap: 10px;
  color: var(--gray2);
}

.poster-placeholder .movie-icon { font-size: 48px; }
.poster-placeholder .movie-title-ph {
  font-family: 'Bebas Neue', cursive;
  font-size: 13px;
  letter-spacing: 2px;
  text-align: center;
  padding: 0 10px;
}

/* ===== OFFERS SECTION ===== */
.offers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

.offer-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px;
  position: relative;
  overflow: hidden;
  background: var(--surface);
}

.offer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--white);
}

.offer-code {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px;
  letter-spacing: 3px;
  margin-bottom: 8px;
}

.offer-desc { color: var(--gray); font-size: 13px; margin-bottom: 16px; }

.offer-badge {
  display: inline-block;
  background: var(--white);
  color: var(--bg);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 50px;
}

/* ===== FOOTER ===== */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 60px 40px 40px;
}

.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 40px;
}

.footer-brand .logo-text {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

.footer-brand p { color: var(--gray); font-size: 13px; line-height: 1.7; max-width: 240px; }

.footer-col h4 {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 16px;
}

.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 10px; }
.footer-col ul li a { font-size: 13px; color: var(--gray); transition: color 0.2s; }
.footer-col ul li a:hover { color: var(--white); }

.footer-bottom {
  border-top: 1px solid var(--border);
  padding-top: 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-bottom p { font-size: 12px; color: var(--gray); }

/* ===== AUTH PAGES ===== */
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 70%),
    var(--bg);
}

.auth-box {
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
}

.auth-logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 28px;
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 8px;
}

.auth-subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--gray);
  margin-bottom: 36px;
}

.form-group { margin-bottom: 20px; }

.form-group label {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 16px;
  color: var(--white);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color: var(--white); }

.form-group textarea { resize: vertical; min-height: 120px; }

.form-group select option { background: var(--surface2); }

.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 13px;
  color: var(--gray);
}

.auth-footer a { color: var(--white); text-decoration: underline; }

.toast {
  padding: 10px 16px;
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 16px;
  text-align: center;
  display: none;
}
.toast.success { background: rgba(68,204,136,0.15); border: 1px solid var(--success); color: var(--success); display: block; }
.toast.error { background: rgba(255,68,68,0.1); border: 1px solid var(--danger); color: var(--danger); display: block; }

/* ===== MOVIE DETAIL ===== */
.movie-detail {
  max-width: 1100px;
  margin: 0 auto;
  padding: 60px 40px;
}

.movie-detail-inner {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 60px;
  align-items: start;
}

.detail-poster {
  aspect-ratio: 2/3;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface2);
}

.detail-poster img { width: 100%; height: 100%; object-fit: cover; }

.detail-meta .genre-tag {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray);
  margin-bottom: 12px;
}

.detail-meta h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: clamp(40px, 6vw, 72px);
  letter-spacing: 3px;
  line-height: 0.95;
  margin-bottom: 20px;
}

.detail-stats {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
.stat-value { font-size: 16px; font-weight: 600; }

.detail-desc { color: var(--gray); font-size: 14px; line-height: 1.8; margin-bottom: 28px; }

.seats-warning {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: rgba(255,68,68,0.08);
  border: 1px solid rgba(255,68,68,0.25);
  border-radius: 6px;
  font-size: 13px;
  color: var(--danger);
  margin-bottom: 28px;
}

/* ===== SEATS PAGE ===== */
.seats-page { max-width: 800px; margin: 0 auto; padding: 60px 40px; }
.seats-page h1 { font-family: 'Bebas Neue', cursive; font-size: 48px; letter-spacing: 3px; margin-bottom: 8px; }
.seats-page .sub { color: var(--gray); font-size: 13px; margin-bottom: 40px; }

.screen-bar {
  width: 70%;
  margin: 0 auto 40px;
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--white), transparent);
  border-radius: 2px;
  position: relative;
}

.screen-bar::after {
  content: 'SCREEN';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gray2);
}

.seats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 40px;
}

.seat {
  aspect-ratio: 1;
  border-radius: 6px;
  background: var(--seat-free);
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--gray);
  font-weight: 600;
  transition: all 0.15s;
}

.seat:hover:not(.taken) { border-color: var(--white); }

.seat.selected {
  background: var(--seat-sel);
  color: var(--bg);
  border-color: var(--white);
}

.seat.taken {
  background: var(--seat-taken);
  cursor: not-allowed;
  opacity: 0.4;
  color: var(--gray2);
}

.seat-legend {
  display: flex;
  gap: 24px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--gray); }
.legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
.legend-dot.free { background: var(--seat-free); border: 1px solid var(--border); }
.legend-dot.selected { background: var(--white); }
.legend-dot.taken { background: var(--seat-taken); opacity: 0.4; }

.booking-summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  margin-bottom: 24px;
}

.summary-row { display: flex; justify-content: space-between; padding: 8px 0; }
.summary-row:not(:last-child) { border-bottom: 1px solid var(--border); }
.summary-label { font-size: 13px; color: var(--gray); }
.summary-value { font-size: 13px; font-weight: 600; }
.summary-value.total { font-size: 18px; font-family: 'Bebas Neue', cursive; letter-spacing: 1px; }

/* ===== CONFIRMATION ===== */
.confirmation-page { max-width: 560px; margin: 0 auto; padding: 80px 40px; text-align: center; }

.confirm-icon {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(68,204,136,0.1);
  border: 2px solid var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin: 0 auto 32px;
}

.confirmation-page h1 {
  font-family: 'Bebas Neue', cursive;
  font-size: 52px;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

.confirmation-page .sub { color: var(--gray); margin-bottom: 40px; }

.ticket-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  text-align: left;
  margin-bottom: 32px;
}

.ticket-header {
  background: var(--white);
  color: var(--bg);
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ticket-header .ticket-logo {
  font-family: 'Bebas Neue', cursive;
  font-size: 20px;
  letter-spacing: 3px;
}

.ticket-header .ticket-id { font-size: 11px; font-weight: 600; letter-spacing: 1px; opacity: 0.6; }

.ticket-body { padding: 24px; }
.ticket-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.ticket-row:last-child { border-bottom: none; }
.ticket-key { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
.ticket-val { font-size: 14px; font-weight: 600; text-align: right; }

.ticket-divider {
  border: none;
  border-top: 2px dashed var(--border);
  margin: 0;
}

/* ===== FEEDBACK PAGE ===== */
.feedback-page { max-width: 600px; margin: 0 auto; padding: 80px 40px; }
.feedback-page h1 { font-family: 'Bebas Neue', cursive; font-size: 52px; letter-spacing: 3px; margin-bottom: 8px; }
.feedback-page .sub { color: var(--gray); margin-bottom: 40px; }

.star-group { display: flex; gap: 8px; margin-bottom: 24px; }
.star {
  font-size: 28px;
  cursor: pointer;
  color: var(--gray2);
  transition: color 0.15s;
  user-select: none;
}
.star.active { color: var(--white); }

/* ===== ADMIN PAGE ===== */
.admin-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 64px);
}

.admin-sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 32px 0;
}

.sidebar-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gray);
  padding: 0 24px;
  margin-bottom: 16px;
}

.sidebar-nav { list-style: none; }
.sidebar-nav li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 24px;
  font-size: 13px;
  color: var(--gray);
  transition: all 0.2s;
}
.sidebar-nav li a:hover, .sidebar-nav li a.active {
  color: var(--white);
  background: rgba(255,255,255,0.05);
}
.sidebar-nav li a .icon { font-size: 16px; }

.admin-main { padding: 40px; overflow-y: auto; }

.admin-section { display: none; }
.admin-section.active { display: block; }

.admin-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.admin-header h2 {
  font-family: 'Bebas Neue', cursive;
  font-size: 36px;
  letter-spacing: 2px;
}

/* ===== STATS CARDS ===== */
.stats-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
}
.stat-card .s-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 8px; }
.stat-card .s-value { font-family: 'Bebas Neue', cursive; font-size: 36px; letter-spacing: 2px; }

/* ===== TABLE ===== */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }

table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
thead th {
  padding: 14px 16px;
  text-align: left;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray);
  border-bottom: 1px solid var(--border);
}
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }

.table-poster {
  width: 40px;
  height: 56px;
  border-radius: 4px;
  object-fit: cover;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.action-btns { display: flex; gap: 8px; }

/* ===== ADD MOVIE FORM ===== */
.add-movie-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  margin-bottom: 40px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* ===== PAGE HEADER ===== */
.page-header {
  padding: 60px 40px 0;
  max-width: 1200px;
  margin: 0 auto;
}

.page-header h1 { font-family: 'Bebas Neue', cursive; font-size: clamp(40px, 7vw, 72px); letter-spacing: 3px; margin-bottom: 8px; }
.page-header p { color: var(--gray); font-size: 14px; }

/* ===== BREADCRUMB ===== */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--gray);
  margin-bottom: 40px;
}
.breadcrumb a { color: var(--gray); transition: color 0.2s; }
.breadcrumb a:hover { color: var(--white); }
.breadcrumb span { color: var(--gray2); }

/* ===== SEARCH RESULTS ===== */
.search-results-info { font-size: 13px; color: var(--gray); margin-bottom: 24px; }

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  .navbar { padding: 0 20px; }
  .nav-links { display: none; flex-direction: column; position: absolute; top: 64px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px; gap: 16px; }
  .nav-links.open { display: flex; }
  .hamburger { display: flex; }

  section { padding: 60px 20px; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .movie-detail-inner { grid-template-columns: 1fr; }
  .detail-poster { max-width: 240px; }
  .admin-layout { grid-template-columns: 1fr; }
  .admin-sidebar { display: none; }
  .form-row { grid-template-columns: 1fr; }
  .seats-grid { grid-template-columns: repeat(4, 1fr); }
  .page-header { padding: 40px 20px 0; }
  .movie-detail { padding: 40px 20px; }
  .seats-page { padding: 40px 20px; }
  .feedback-page { padding: 60px 20px; }
  .confirmation-page { padding: 60px 20px; }
}

@media (max-width: 480px) {
  .footer-grid { grid-template-columns: 1fr; }
  .seats-grid { grid-template-columns: repeat(4, 1fr); }
}

  <script>
// ============================================
// CineFlow – script.js
// Vanilla JS: auth, seats, feedback, admin
// ============================================

// ───────────────────────────────────────────
// MOVIES DATA (shared across pages)
// ───────────────────────────────────────────
const MOVIES = [
  { id: 1, title: "Interstellar Void", genre: "Sci-Fi", rating: "8.9", duration: "2h 49m", price: 280, desc: "A crew of astronauts journey through a wormhole near Saturn in search of a new home for humanity as Earth faces extinction. A breathtaking odyssey across time and space.", language: "English", seats_left: 4 },
  { id: 2, title: "Shadow Protocol", genre: "Thriller", rating: "7.8", duration: "2h 12m", price: 240, desc: "A rogue intelligence operative uncovers a global conspiracy that threatens to rewrite history. Every decision leads deeper into the labyrinth.", language: "English", seats_left: 12 },
  { id: 3, title: "The Last Sonata", genre: "Drama", rating: "8.2", duration: "1h 58m", price: 220, desc: "A famed pianist losing his hearing races against time to compose one final masterpiece — a love letter to the music that defined his life.", language: "English", seats_left: 7 },
  { id: 4, title: "Neon Requiem", genre: "Action", rating: "7.5", duration: "2h 05m", price: 260, desc: "In a city where corporations rule and justice is for sale, one ex-detective fights to reclaim the streets from the syndicate that destroyed his family.", language: "English", seats_left: 15 },
  { id: 5, title: "Pale Blue Tide", genre: "Horror", rating: "7.2", duration: "1h 52m", price: 200, desc: "A marine biologist's deep-sea expedition encounters something ancient and sentient. Some discoveries were meant to stay buried in the dark.", language: "English", seats_left: 3 },
  { id: 6, title: "The Grand Cipher", genre: "Mystery", rating: "8.5", duration: "2h 28m", price: 250, desc: "A cryptographer inherits a map containing the locations of seven stolen masterpieces, each guarded by an elaborate puzzle designed by her late grandfather.", language: "English", seats_left: 9 },
];

const EMOJIS = ["🚀", "🔫", "🎹", "⚡", "🌊", "🔍"];

// ───────────────────────────────────────────
// UTILITIES
// ───────────────────────────────────────────
function $(sel, ctx) { return (ctx || document).querySelector(sel); }
function $$(sel, ctx) { return [...(ctx || document).querySelectorAll(sel)]; }

function showToast(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'toast ' + type;
  setTimeout(() => el.classList.remove(type), 3500);
}

function generateId() {
  return 'CF' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,5).toUpperCase();
}

// ───────────────────────────────────────────
// NAVBAR – hamburger menu
// ───────────────────────────────────────────
function initNavbar() {
  const hamburger = $('.hamburger');
  const navLinks = $('.nav-links');
  if (!hamburger || !navLinks) return;

  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!hamburger.contains(e.target) && !navLinks.contains(e.target)) {
      navLinks.classList.remove('open');
    }
  });

  // Highlight active link
  const currentPage = window.location.pathname.split('/').pop() || 'index.html';
  $$('.nav-links a').forEach(a => {
    if (a.getAttribute('href') === currentPage) a.classList.add('active');
  });

  // Show/hide login vs profile
  updateNavAuth();
}

function updateNavAuth() {
  const user = JSON.parse(localStorage.getItem('cf_user') || 'null');
  const loginLink = document.getElementById('nav-login');
  const logoutLink = document.getElementById('nav-logout');
  if (loginLink) loginLink.style.display = user ? 'none' : '';
  if (logoutLink) logoutLink.style.display = user ? '' : 'none';
}

function logout() {
  localStorage.removeItem('cf_user');
  window.location.href = 'index.html';
}

// ───────────────────────────────────────────
// HOME PAGE – search
// ───────────────────────────────────────────
function initSearch() {
  const btn = document.getElementById('search-btn');
  const input = document.getElementById('search-input');
  if (!btn || !input) return;

  function doSearch() {
    const q = input.value.trim();
    if (q) window.location.href = `movies.html?q=${encodeURIComponent(q)}`;
  }

  btn.addEventListener('click', doSearch);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
}

// ───────────────────────────────────────────
// MOVIES PAGE
// ───────────────────────────────────────────
function initMoviesPage() {
  const grid = document.getElementById('movies-grid');
  if (!grid) return;

  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';

  const info = document.getElementById('search-results-info');
  let movies = MOVIES;

  if (q) {
    movies = MOVIES.filter(m =>
      m.title.toLowerCase().includes(q.toLowerCase()) ||
      m.genre.toLowerCase().includes(q.toLowerCase())
    );
    if (info) info.textContent = `${movies.length} result${movies.length !== 1 ? 's' : ''} for "${q}"`;
    if (document.getElementById('search-input')) document.getElementById('search-input').value = q;
  } else {
    if (info) info.textContent = `${movies.length} movies now showing`;
  }

  renderMovieCards(grid, movies);
}

function renderMovieCards(grid, movies) {
  if (!movies.length) {
    grid.innerHTML = '<p style="color:var(--gray);grid-column:1/-1;">No movies found.</p>';
    return;
  }
  grid.innerHTML = movies.map((m, i) => `
    <div class="movie-card" style="animation-delay:${i * 0.06}s">
      <div class="poster">
        <div class="poster-placeholder">
          <div class="movie-icon">${EMOJIS[m.id - 1] || '🎬'}</div>
          <div class="movie-title-ph">${m.title}</div>
        </div>
        <div class="rating">⭐ ${m.rating}</div>
      </div>
      <div class="card-body">
        <div class="genre-tag">${m.genre} · ${m.duration}</div>
        <div class="title">${m.title}</div>
        <div class="card-footer">
          <div class="price">From <strong>₹${m.price}</strong></div>
          <a href="movie.html?id=${m.id}" class="btn btn-primary btn-sm">Book</a>
        </div>
      </div>
    </div>
  `).join('');
}

// Home page trending
function initTrending() {
  const grid = document.getElementById('trending-grid');
  if (!grid) return;
  renderMovieCards(grid, MOVIES.slice(0, 3));
}

// ───────────────────────────────────────────
// MOVIE DETAIL PAGE
// ───────────────────────────────────────────
function initMovieDetail() {
  const container = document.getElementById('movie-detail');
  if (!container) return;

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const movie = MOVIES.find(m => m.id === id);

  if (!movie) {
    container.innerHTML = '<p style="color:var(--gray)">Movie not found.</p>';
    return;
  }

  document.title = `${movie.title} – CineFlow`;

  container.innerHTML = `
    <div class="breadcrumb">
      <a href="movies.html">Movies</a>
      <span>›</span>
      <span>${movie.title}</span>
    </div>
    <div class="movie-detail-inner">
      <div class="detail-poster">
        <div class="poster-placeholder" style="height:100%;min-height:360px;">
          <div class="movie-icon" style="font-size:72px">${EMOJIS[movie.id - 1] || '🎬'}</div>
          <div class="movie-title-ph" style="font-size:16px">${movie.title}</div>
        </div>
      </div>
      <div class="detail-meta">
        <div class="genre-tag">${movie.genre}</div>
        <h1>${movie.title}</h1>
        <div class="detail-stats">
          <div class="stat"><span class="stat-label">Rating</span><span class="stat-value">⭐ ${movie.rating}</span></div>
          <div class="stat"><span class="stat-label">Duration</span><span class="stat-value">${movie.duration}</span></div>
          <div class="stat"><span class="stat-label">Language</span><span class="stat-value">${movie.language}</span></div>
          <div class="stat"><span class="stat-label">Price</span><span class="stat-value">₹${movie.price}</span></div>
        </div>
        <p class="detail-desc">${movie.desc}</p>
        ${movie.seats_left <= 6 ? `<div class="seats-warning">⚠️ Only ${movie.seats_left} seats left! Book now.</div>` : ''}
        <a href="seats.html?id=${movie.id}" class="btn btn-primary">Select Seats →</a>
      </div>
    </div>
  `;
}

// ───────────────────────────────────────────
// REGISTER
// ───────────────────────────────────────────
function initRegister() {
  const form = document.getElementById('register-form');
  if (!form) return;

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = form.querySelector('#reg-name').value.trim();
    const email = form.querySelector('#reg-email').value.trim().toLowerCase();
    const pass = form.querySelector('#reg-pass').value;
    const pass2 = form.querySelector('#reg-pass2').value;

    if (!name || !email || !pass) return showToast('reg-toast', 'All fields are required.', 'error');
    if (pass !== pass2) return showToast('reg-toast', 'Passwords do not match.', 'error');
    if (pass.length < 6) return showToast('reg-toast', 'Password must be at least 6 characters.', 'error');

    const users = JSON.parse(localStorage.getItem('cf_users') || '[]');
    if (users.find(u => u.email === email)) return showToast('reg-toast', 'Email already registered.', 'error');

    users.push({ name, email, pass });
    localStorage.setItem('cf_users', JSON.stringify(users));
    showToast('reg-toast', 'Account created! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'login.html', 1500);
  });
}

// ───────────────────────────────────────────
// LOGIN
// ───────────────────────────────────────────
function initLogin() {
  const form = document.getElementById('login-form');
  if (!form) return;

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = form.querySelector('#login-email').value.trim().toLowerCase();
    const pass = form.querySelector('#login-pass').value;

    // Admin shortcut
    if (email === 'admin@cineflow.com' && pass === 'admin123') {
      localStorage.setItem('cf_user', JSON.stringify({ name: 'Admin', email, role: 'admin' }));
      showToast('login-toast', 'Welcome, Admin! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'admin.html', 1200);
      return;
    }

    const users = JSON.parse(localStorage.getItem('cf_users') || '[]');
    const user = users.find(u => u.email === email && u.pass === pass);

    if (!user) return showToast('login-toast', 'Invalid email or password.', 'error');

    localStorage.setItem('cf_user', JSON.stringify({ name: user.name, email: user.email }));
    showToast('login-toast', `Welcome back, ${user.name}!`, 'success');
    setTimeout(() => window.location.href = 'index.html', 1200);
  });
}

// ───────────────────────────────────────────
// SEAT SELECTION
// ───────────────────────────────────────────
function initSeats() {
  const grid = document.getElementById('seats-grid');
  if (!grid) return;

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'));
  const movie = MOVIES.find(m => m.id === id) || MOVIES[0];

  // Set movie info
  const movieTitle = document.getElementById('seat-movie-title');
  const moviePrice = document.getElementById('seat-movie-price');
  if (movieTitle) movieTitle.textContent = movie.title;
  if (moviePrice) moviePrice.textContent = '₹' + movie.price;

  const totalSeats = 20;
  // Randomly mark some as taken
  const takenSeats = [3, 7, 11, 15, 18];
  let selectedSeats = [];

  // Render seats
  grid.innerHTML = '';
  for (let i = 1; i <= totalSeats; i++) {
    const seat = document.createElement('div');
    seat.className = 'seat';
    seat.textContent = i;
    seat.dataset.seat = i;

    if (takenSeats.includes(i)) {
      seat.classList.add('taken');
      seat.title = 'Already booked';
    } else {
      seat.addEventListener('click', () => toggleSeat(seat, i, movie));
    }

    grid.appendChild(seat);
  }

  function toggleSeat(seatEl, num, movie) {
    if (selectedSeats.includes(num)) {
      selectedSeats = selectedSeats.filter(s => s !== num);
      seatEl.classList.remove('selected');
    } else {
      selectedSeats.push(num);
      seatEl.classList.add('selected');
    }
    updateSummary(movie);
  }

  function updateSummary(movie) {
    const selDisplay = document.getElementById('summary-seats');
    const totalDisplay = document.getElementById('summary-total');
    if (selDisplay) selDisplay.textContent = selectedSeats.length ? selectedSeats.join(', ') : '—';
    if (totalDisplay) totalDisplay.textContent = '₹' + (selectedSeats.length * movie.price);
  }

  // Confirm booking
  const confirmBtn = document.getElementById('confirm-booking');
  if (confirmBtn) {
    confirmBtn.addEventListener('click', () => {
      if (!selectedSeats.length) {
        alert('Please select at least one seat.');
        return;
      }
      const booking = {
        id: generateId(),
        movieId: movie.id,
        movieTitle: movie.title,
        genre: movie.genre,
        seats: selectedSeats,
        price: movie.price,
        total: selectedSeats.length * movie.price,
        date: new Date().toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }),
        time: '7:30 PM',
        hall: 'Hall A',
        bookedAt: new Date().toISOString()
      };

      localStorage.setItem('cf_last_booking', JSON.stringify(booking));

      // Save to all bookings list
      const all = JSON.parse(localStorage.getItem('cf_bookings') || '[]');
      all.push(booking);
      localStorage.setItem('cf_bookings', JSON.stringify(all));

      window.location.href = 'confirmation.html';
    });
  }
}

// ───────────────────────────────────────────
// CONFIRMATION PAGE
// ───────────────────────────────────────────
function initConfirmation() {
  const card = document.getElementById('ticket-card');
  if (!card) return;

  const booking = JSON.parse(localStorage.getItem('cf_last_booking') || 'null');
  if (!booking) {
    card.innerHTML = '<p style="color:var(--gray);text-align:center;padding:24px">No booking found.</p>';
    return;
  }

  card.innerHTML = `
    <div class="ticket-header">
      <span class="ticket-logo">CINEFLOW</span>
      <span class="ticket-id">#${booking.id}</span>
    </div>
    <hr class="ticket-divider">
    <div class="ticket-body">
      <div class="ticket-row"><span class="ticket-key">Movie</span><span class="ticket-val">${booking.movieTitle}</span></div>
      <div class="ticket-row"><span class="ticket-key">Genre</span><span class="ticket-val">${booking.genre}</span></div>
      <div class="ticket-row"><span class="ticket-key">Date</span><span class="ticket-val">${booking.date}</span></div>
      <div class="ticket-row"><span class="ticket-key">Show Time</span><span class="ticket-val">${booking.time}</span></div>
      <div class="ticket-row"><span class="ticket-key">Hall</span><span class="ticket-val">${booking.hall}</span></div>
      <div class="ticket-row"><span class="ticket-key">Seats</span><span class="ticket-val">${booking.seats.join(', ')}</span></div>
      <div class="ticket-row"><span class="ticket-key">Amount Paid</span><span class="ticket-val">₹${booking.total}</span></div>
    </div>
  `;
}

// ───────────────────────────────────────────
// FEEDBACK
// ───────────────────────────────────────────
function initFeedback() {
  const form = document.getElementById('feedback-form');
  if (!form) return;

  // Star rating
  let currentRating = 0;
  const stars = $$('.star');

  stars.forEach((star, index) => {
    star.addEventListener('mouseover', () => highlightStars(index + 1));
    star.addEventListener('mouseleave', () => highlightStars(currentRating));
    star.addEventListener('click', () => { currentRating = index + 1; highlightStars(currentRating); });
  });

  function highlightStars(count) {
    stars.forEach((s, i) => { s.classList.toggle('active', i < count); });
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = form.querySelector('#fb-name').value.trim();
    const movie = form.querySelector('#fb-movie').value.trim();
    const text = form.querySelector('#fb-text').value.trim();

    if (!text) return showToast('fb-toast', 'Please enter your feedback.', 'error');

    const feedback = {
      id: generateId(),
      name: name || 'Anonymous',
      movie,
      rating: currentRating,
      text,
      date: new Date().toLocaleDateString('en-IN')
    };

    const all = JSON.parse(localStorage.getItem('cf_feedback') || '[]');
    all.push(feedback);
    localStorage.setItem('cf_feedback', JSON.stringify(all));

    showToast('fb-toast', '🎉 Thank you for your feedback!', 'success');
    form.reset();
    currentRating = 0;
    highlightStars(0);

    renderFeedbackList();
  });

  renderFeedbackList();
}

function renderFeedbackList() {
  const list = document.getElementById('feedback-list');
  if (!list) return;

  const all = JSON.parse(localStorage.getItem('cf_feedback') || '[]').reverse();
  if (!all.length) {
    list.innerHTML = '<p style="color:var(--gray);font-size:13px">No feedback yet. Be the first!</p>';
    return;
  }

  list.innerHTML = all.slice(0, 5).map(f => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <strong style="font-size:14px">${f.name}</strong>
        <span style="font-size:12px;color:var(--gray)">${f.date}</span>
      </div>
      ${f.movie ? `<div style="font-size:11px;color:var(--gray);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">${f.movie}</div>` : ''}
      ${f.rating ? `<div style="margin-bottom:8px;font-size:14px">${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</div>` : ''}
      <p style="font-size:13px;color:var(--gray);line-height:1.7">${f.text}</p>
    </div>
  `).join('');
}

// ───────────────────────────────────────────
// ADMIN PAGE
// ───────────────────────────────────────────
function initAdmin() {
  const sidebar = $$('.sidebar-nav li a');
  if (!sidebar.length) return;

  // Sidebar tab switching
  sidebar.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = link.dataset.tab;
      if (!target) return;
      sidebar.forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      $$('.admin-section').forEach(sec => sec.classList.remove('active'));
      const sec = document.getElementById(target);
      if (sec) sec.classList.add('active');
    });
  });

  // Load movies table
  loadAdminMoviesTable();
  loadBookingsTable();
  loadAdminStats();

  // Add movie form
  const addForm = document.getElementById('add-movie-form');
  if (addForm) {
    addForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const title = addForm.querySelector('#am-title').value.trim();
      const genre = addForm.querySelector('#am-genre').value.trim();
      const price = addForm.querySelector('#am-price').value;
      if (!title || !genre || !price) return showToast('am-toast', 'All fields required.', 'error');

      const custom = JSON.parse(localStorage.getItem('cf_custom_movies') || '[]');
      const newId = 100 + custom.length + 1;
      custom.push({ id: newId, title, genre, price: parseInt(price), rating: '7.0', duration: '2h 00m', language: 'English', desc: 'Coming soon.', seats_left: 20 });
      localStorage.setItem('cf_custom_movies', JSON.stringify(custom));
      showToast('am-toast', 'Movie added!', 'success');
      addForm.reset();
      loadAdminMoviesTable();
      loadAdminStats();
    });
  }
}

function getAllMovies() {
  const custom = JSON.parse(localStorage.getItem('cf_custom_movies') || '[]');
  return [...MOVIES, ...custom];
}

function loadAdminMoviesTable() {
  const tbody = document.getElementById('movies-tbody');
  if (!tbody) return;

  const movies = getAllMovies();
  tbody.innerHTML = movies.map((m, i) => `
    <tr>
      <td><div class="table-poster">${EMOJIS[m.id - 1] || '🎬'}</div></td>
      <td><strong>${m.title}</strong></td>
      <td>${m.genre}</td>
      <td>₹${m.price}</td>
      <td>⭐ ${m.rating}</td>
      <td>
        <div class="action-btns">
          <button class="btn btn-outline btn-sm" onclick="editMovie(${m.id})">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMovie(${m.id})">Delete</button>
        </div>
      </td>
    </tr>
  `).join('');
}

function loadBookingsTable() {
  const tbody = document.getElementById('bookings-tbody');
  if (!tbody) return;

  const bookings = JSON.parse(localStorage.getItem('cf_bookings') || '[]').reverse();
  if (!bookings.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="color:var(--gray);text-align:center;padding:32px">No bookings yet.</td></tr>';
    return;
  }

  tbody.innerHTML = bookings.map(b => `
    <tr>
      <td><code style="font-size:11px;color:var(--gray)">#${b.id}</code></td>
      <td>${b.movieTitle}</td>
      <td>${b.seats.join(', ')}</td>
      <td>${b.date}</td>
      <td>₹${b.total}</td>
      <td><span style="color:var(--success);font-size:12px;font-weight:600">✓ Confirmed</span></td>
    </tr>
  `).join('');
}

function loadAdminStats() {
  const movies = getAllMovies();
  const bookings = JSON.parse(localStorage.getItem('cf_bookings') || '[]');
  const users = JSON.parse(localStorage.getItem('cf_users') || '[]');
  const revenue = bookings.reduce((sum, b) => sum + (b.total || 0), 0);

  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('stat-movies', movies.length);
  set('stat-bookings', bookings.length);
  set('stat-users', users.length);
  set('stat-revenue', '₹' + revenue.toLocaleString('en-IN'));
}

function editMovie(id) {
  const title = prompt('Enter new title for movie ID ' + id + ':');
  if (!title) return;
  const custom = JSON.parse(localStorage.getItem('cf_custom_movies') || '[]');
  const idx = custom.findIndex(m => m.id === id);
  if (idx !== -1) { custom[idx].title = title; localStorage.setItem('cf_custom_movies', JSON.stringify(custom)); }
  loadAdminMoviesTable();
}

function deleteMovie(id) {
  if (!confirm('Delete this movie?')) return;
  const custom = JSON.parse(localStorage.getItem('cf_custom_movies') || '[]');
  const filtered = custom.filter(m => m.id !== id);
  localStorage.setItem('cf_custom_movies', JSON.stringify(filtered));
  // Cannot delete base movies, just show message
  loadAdminMoviesTable();
  loadAdminStats();
  showToast('am-toast', 'Movie removed from list.', 'success');
}

  initSearch();

  initMovieDetail();
  initRegister();
  initLogin();
  initSeats();
  initConfirmation();
  initFeedback();
  initAdmin();
});
  </script>
